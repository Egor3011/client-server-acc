server {
    listen 80;
    listen 443 ssl;
    server_name race-hub.ru api.race-hub.ru localhost 127.0.0.1;

    ssl_certificate /etc/letsencrypt/live/race-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/race-hub.ru/privkey.pem;

    # Proxy via host ports so nginx works even if Docker DNS
    # between containers is broken / containers are on different networks.
    location /api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://host.docker.internal:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
