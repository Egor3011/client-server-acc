services:
  backend:
    build:
      context: ./server-backend
    container_name: acc-backend
    restart: unless-stopped
    volumes:
      - ./server-backend/data:/app/data
    ports:
      - "8000:8000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/docs'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  webapp:
    build:
      context: ./webapp-all/sait
      args:
        VITE_API_BASE_URL: /api
        VITE_SERVER_WS_PORT: 8765
    container_name: acc-webapp
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: acc-nginx
    restart: unless-stopped
    depends_on:
      webapp:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app

networks:
  app:
    driver: bridge
