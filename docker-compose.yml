services:
  backend:
    build:
      context: ./server-backend
    container_name: acc-backend
    restart: unless-stopped
    volumes:
      # Связываем локальную папку на сервере с папкой внутри Docker
      # ./acc_results — папка создастся прямо рядом с файлом docker-compose.yml
      - ./server-backend/data:/app/data
    ports:
      - "8000:8000"

  webapp:
    build:
      context: ./webapp-all/sait
      args:
        VITE_API_BASE_URL: /api
        VITE_SERVER_WS_PORT: 8765
    container_name: acc-webapp
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: acc-nginx
    restart: unless-stopped
    depends_on:
      - webapp
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
