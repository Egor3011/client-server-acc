services:
  backend:
    build:
      context: ./server-backend
    container_name: acc-backend
    restart: unless-stopped
    volumes:
      - ./server-backend/data:/app/data
    ports:
      - "8000:8000"
    networks:
      - app

  webapp:
    build:
      context: ./webapp-all/sait
      args:
        VITE_API_BASE_URL: /api
        VITE_SERVER_WS_PORT: 8765
    container_name: acc-webapp
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    container_name: acc-nginx
    restart: unless-stopped
    depends_on:
      - webapp
      - backend
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app

networks:
  app:
    driver: bridge
